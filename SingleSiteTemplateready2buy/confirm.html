<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirm Your Booking</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0a0a0a;
    --dark: #111111;
    --card: #1a1a1a;
    --border: #2a2a2a;
    --accent: #f97316;
    --white: #ffffff;
    --gray: #888888;
    --success: #22c55e;
    --error: #ef4444;
  }

  html, body {
    min-height: 100%;
    height: 100%;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--black);
    color: var(--white);
    display: block;
    padding: 24px 0;
    position: relative;
    overflow-x: hidden;
    overflow-y: auto;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 560px;
    margin: 0 auto;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(ellipse at 60% 40%, rgba(249,115,22,0.05) 0%, transparent 50%);
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 560px;
  }

  /* HEADER */
  .page-header {
    margin-bottom: 48px;
  }

  .gym-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    line-height: 0.9;
    letter-spacing: -1px;
    margin-bottom: 4px;
  }

  .gym-logo span { color: var(--accent); }

  .page-subtitle {
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gray);
  }

  /* CLASS SUMMARY */
  .class-summary {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    margin-bottom: 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
  }

  .class-summary-left {}

  .class-summary-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 1px;
    color: var(--white);
    line-height: 1;
    margin-bottom: 4px;
  }

  .class-summary-time {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
  }

  .class-summary-price {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    color: var(--accent);
    letter-spacing: -1px;
    flex-shrink: 0;
  }

  /* STATES */
  .state { display: none; }
  .state.active { display: block; }

  /* WAITING STATE */
  .waiting-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 32px;
    text-align: center;
    margin-bottom: 24px;
  }

  .waiting-icon {
    width: 64px; height: 64px;
    background: var(--accent-dim, rgba(249,115,22,0.1));
    border: 2px solid rgba(249,115,22,0.3);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    font-size: 28px;
  }

  .waiting-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .waiting-body {
    font-size: 14px;
    color: rgba(255,255,255,0.55);
    line-height: 1.7;
    margin-bottom: 28px;
    font-weight: 300;
  }

  .confirm-btn {
    width: 100%;
    background: var(--accent);
    color: var(--black);
    border: none;
    border-radius: 8px;
    padding: 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    letter-spacing: 0.3px;
  }

  .confirm-btn:hover { background: #d4eb00; }
  .confirm-btn:active { transform: scale(0.98); }
  .confirm-btn:disabled { background: var(--border); color: var(--gray); cursor: not-allowed; }

  /* LOADING STATE */
  .loading-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 48px 32px;
    text-align: center;
  }

  .big-spinner {
    width: 48px; height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .loading-body {
    font-size: 13px;
    color: var(--gray);
    font-weight: 300;
  }

  /* SUCCESS STATE */
  .success-card {
    background: var(--card);
    border: 1px solid rgba(34,197,94,0.3);
    border-radius: 10px;
    padding: 48px 32px;
    text-align: center;
  }

  .success-icon {
    width: 72px; height: 72px;
    background: rgba(34,197,94,0.15);
    border: 2px solid rgba(34,197,94,0.4);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    font-size: 32px;
  }

  .success-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    letter-spacing: -1px;
    color: var(--success);
    line-height: 1;
    margin-bottom: 8px;
  }

  .success-sub {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 1px;
    color: var(--white);
    margin-bottom: 16px;
  }

  .success-body {
    font-size: 14px;
    color: rgba(255,255,255,0.55);
    line-height: 1.7;
    font-weight: 300;
    margin-bottom: 32px;
  }

  .booking-id {
    display: inline-block;
    background: rgba(34,197,94,0.1);
    border: 1px solid rgba(34,197,94,0.2);
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--success);
  }

  /* ERROR STATE */
  .error-card {
    background: var(--card);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 10px;
    padding: 48px 32px;
    text-align: center;
  }

  .error-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 1px;
    color: var(--error);
    margin-bottom: 8px;
  }

  .error-body {
    font-size: 14px;
    color: rgba(255,255,255,0.55);
    line-height: 1.7;
    font-weight: 300;
    margin-bottom: 24px;
  }

  .retry-btn {
    background: transparent;
    color: var(--white);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 24px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .retry-btn:hover { border-color: var(--gray); }

  /* NO SESSION */
  .no-session {
    text-align: center;
    padding: 48px 0;
    color: var(--gray);
  }

  .no-session a {
    color: var(--accent);
    text-decoration: none;
  }
</style>
</head>
<body>

<div class="container">

  <div class="page-header">
    <div class="gym-logo"><img src="xgt_logo.webp" alt="XGT Fitness" style="height:48px;width:auto;display:block;"></div>
    <div class="page-subtitle">Purchase Confirmation</div>
  </div>

  <div id="classInfo" class="class-summary" style="display:none;">
    <div class="class-summary-left">
      <div class="class-summary-name" id="summaryClassName"></div>
      <div class="class-summary-time" id="summaryClassTime"></div>
    </div>
    <div class="class-summary-price" id="summaryPrice">$25</div>
  </div>

  <!-- LOADING -->
  <div class="state" id="stateLoading">
    <div class="loading-card">
      <div class="big-spinner"></div>
      <div class="loading-title">Confirming Your Booking</div>
      <div class="loading-body">Looking up your account and reserving your spot...</div>
    </div>
  </div>

  <!-- SUCCESS -->
  <div class="state" id="stateSuccess">
    <div class="success-card">
      <div class="success-icon">✓</div>
      <div class="success-title">You're In!</div>
      <div class="success-sub" id="successClassName"></div>
      <div class="success-body" id="successBody"></div>
      <div id="successDateTime" style="margin:16px 0;font-size:14px;color:rgba(255,255,255,0.6);line-height:1.8;"></div>
      <div id="successAmount" style="display:inline-block;background:rgba(249,115,22,0.1);border:1px solid rgba(249,115,22,0.2);border-radius:6px;padding:6px 14px;font-size:13px;color:#f97316;margin-bottom:16px;"></div>
      <div class="booking-id" id="successBookingId"></div>
      <button id="calendarBtn" onclick="addToCalendar()" style="display:none;margin-top:20px;width:100%;background:transparent;border:1px solid var(--border);border-radius:6px;padding:12px 20px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--white);cursor:pointer;transition:border-color 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Add to Calendar
      </button>
    </div>
  </div>

  <!-- ERROR -->
  <div class="state" id="stateError">
    <div class="error-card">
      <div class="error-title">Something Went Wrong</div>
      <div class="error-body" id="errorBody">We couldn't complete your booking. Your payment was processed — please contact the gym directly to confirm your class.</div>
      <button class="retry-btn" onclick="confirmBooking()">Try Again</button>
    </div>
  </div>

  <!-- NO SESSION -->
  <div class="state" id="stateNoSession">
    <div class="no-session">
      <p>No booking session found.</p>
      <p style="margin-top: 12px;"><a href="index.html">← Back</a></p>
    </div>
  </div>

</div>

<script>
  // Load session data
  const scheduleId = sessionStorage.getItem('booking_schedule_id');
  const bookingDate = sessionStorage.getItem('booking_date');
  const className = sessionStorage.getItem('booking_class_name');
  const classTime = sessionStorage.getItem('booking_class_time');
  const email = sessionStorage.getItem('booking_email');
  const firstName = sessionStorage.getItem('booking_first_name');
  const promoUsed = sessionStorage.getItem('booking_promo') === 'true';
  const amountPaid = sessionStorage.getItem('booking_amount') || '25';

  function showState(id) {
    document.querySelectorAll('.state').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // payment.html already created the account, charged the card, and booked the class.
  // We just need to display the result.

  const bookingId = sessionStorage.getItem('booking_booking_id');
  const wasPaid   = sessionStorage.getItem('booking_paid');

  if (!wasPaid) {
    showState('stateNoSession');
  } else {

    // Format date with day of week
    function formatBookingDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr + 'T12:00:00');
      return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
    }

    // Add to calendar function
    window.addToCalendar = function() {
      if (!bookingDate || !classTime) return;
      const d = new Date(bookingDate + 'T12:00:00');

      // Parse class time to build start datetime
      const match = classTime.match(/(\d+):(\d+)\s*(AM|PM)/i);
      if (!match) return;
      let hour = parseInt(match[1]);
      const mins = parseInt(match[2]);
      const ampm = match[3].toUpperCase();
      if (ampm === 'PM' && hour !== 12) hour += 12;
      if (ampm === 'AM' && hour === 12) hour = 0;

      d.setHours(hour, mins, 0, 0);
      const end = new Date(d.getTime() + 60 * 60 * 1000); // 1hr duration

      const pad = n => String(n).padStart(2, '0');
      const fmt = dt => `${dt.getFullYear()}${pad(dt.getMonth()+1)}${pad(dt.getDate())}T${pad(dt.getHours())}${pad(dt.getMinutes())}00`;

      const url = `https://calendar.google.com/calendar/render?action=TEMPLATE` +
        `&text=${encodeURIComponent(className || 'XGT Training Session')}` +
        `&dates=${fmt(d)}/${fmt(end)}` +
        `&details=${encodeURIComponent('Booked via Ready2Book')}`;

      window.open(url, '_blank');
    };

    if (bookingId || wasPaid) {
      document.getElementById('successClassName').textContent = '5 SESSION TRIAL PACK';
      document.getElementById('successBody').textContent =
        `Welcome${firstName ? ', ' + firstName : ''}! Your 5-session trial pack is ready to use. Check your email for confirmation details.`;

      // Amount paid
      const amountEl = document.getElementById('successAmount');
      if (promoUsed || amountPaid === '0') {
        amountEl.textContent = '🎉 Free Trial — $0 charged';
      } else {
        amountEl.textContent = `💳 $${amountPaid} paid`;
      }

      // Order ID or fallback
      if (bookingId) {
        document.getElementById('successBookingId').textContent = `Order ID: ${bookingId}`;
      } else {
        document.getElementById('successBookingId').textContent = `Purchase confirmed · see you at XGT`;
      }

      showState('stateSuccess');
    } else {
      showState('stateNoSession');
    }

    // Clear session
    ['booking_schedule_id','booking_date','booking_class_name','booking_class_time',
     'booking_email','booking_first_name','booking_booking_id','booking_paid',
     'booking_payment_userId','booking_user_id','booking_promo','booking_amount'].forEach(k => sessionStorage.removeItem(k));
  }

  // Kept for retry button on error state (shouldn't normally be reached)
  function confirmBooking() {
    window.location.href = 'index.html';
  }
</script>

</body>
</html>
